<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>Sudoku Game</h1>
  <div id="timer" aria-live="polite">00:00</div>
  <div class="difficulty-selector" role="group" aria-label="Difficulty selector">
    <button type="button" class="difficulty-btn active" data-difficulty="easy">Easy</button>
    <button type="button" class="difficulty-btn" data-difficulty="medium">Medium</button>
    <button type="button" class="difficulty-btn" data-difficulty="hard">Hard</button>
  </div>
  <div id="sudoku-board"></div>
  <div class="controls">
    <button id="new-game">New Game</button>
    <button id="check-solution">Check Solution</button>
    <button id="hint">Hint</button>
    <span id="message"></span>
  </div>
  <div id="name-prompt" class="name-prompt" hidden>
    <label for="player-name">Name:</label>
    <input id="player-name" type="text" maxlength="20" placeholder="Your name">
    <button id="save-score" type="button">Save Score</button>
  </div>
  <div class="leaderboard">
    <h2>Top 10 Leaderboard</h2>
    <ol id="leaderboard-list"></ol>
  </div>
  <script src="/static/main.js"></script>
</body>
</html>
